id: org.nuicpp.nui_sftp
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm21
  - org.freedesktop.Sdk.Extension.node24
command: nui-sftp
buildsystem: simple

finish-args:
  - --share=network
  - --filesystem=host
  - --socket=wayland
  - --socket=x11
  - --socket=fallback-x11
  - --socket=ssh-auth
  - --device=dri
  - --device=input

modules:
  - name: boost
    buildsystem: simple
    build-commands:
      - ./bootstrap.sh --prefix=/app
      - ./b2 install
    sources:
      - type: archive
        url: https://archives.boost.io/release/1.90.0/source/boost_1_90_0.tar.gz
        sha256: 5e93d582aff26868d581a52ae78c7d8edf3f3064742c6e77901a1f18a437eea9

  - name: libssh
    buildsystem: simple
    build-commands:
      - cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/app
      - cmake --build build --target install
    sources:
      - type: git
        url: https://git.libssh.org/projects/libssh.git/
        tag: libssh-0.11.4

  - name: interval-tree
    buildsystem: simple
    build-commands:
      - mkdir -p /app/include
      - cp -r include/interval-tree /app/include/interval-tree
    sources:
      - type: git
        url: https://github.com/5cript/interval-tree.git
        tag: v3.1.1

  - name: nlohmann-json
    buildsystem: simple
    build-commands:
      - cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/app
      - cmake --build build --target install
    sources:
      - type: git
        url: https://github.com/nlohmann/json.git
        tag: v3.12.0

  - name: fmt
    buildsystem: simple
    build-commands:
      - cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/app
      - cmake --build build --target install
    sources:
      - type: git
        url: https://github.com/fmtlib/fmt.git
        tag: 12.1.0

  - name: nui-sftp
    buildsystem: simple
    build-options:
      env:
        CC: clang
        CXX: clang++
        LD: lld
        INSTALL_TARGET: /app
        Boost_ROOT: /app
        BUILD_DIRECTORY: build/flatpak
        PKG_CONFIG_PATH: /app/usr/lib/pkgconfig
      append-path: "/usr/lib/sdk/llvm21/bin:/usr/lib/sdk/node24/bin"
      prepend-ld-library-path: "/usr/lib/sdk/llvm21/lib"
      build-args:
        - --share=network
    build-commands:
      - cmake
          -B build/flatpak
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_LINKER=lld
          -DCMAKE_CXX_EXTENSIONS=ON
          -DCMAKE_CXX_STANDARD=23
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          -DNUI_ENABLE_TESTS=OFF
          -DNUI_BUILD_EXAMPLES=OFF
          -DNUI_BUILD_XML_TOOL=ON
          -DNUI_FETCH_TRAITS=OFF
          -DNUI_FETCH_BOOST_PREPROCESSOR=OFF
          -DNUI_FETCH_INTERVAL_TREE=OFF
          -DNUI_FETCH_BOOST_DESCRIBE=OFF
          -DNUI_FETCH_BOOST_MP11=OFF
          -DNUI_FETCH_NLOHMANN_JSON=OFF
          -DNUI_FIND_NLOHMANN_JSON=OFF
          -DNUI_FETCH_BINARYEN=OFF
          -DNUI_FETCH_FMT=OFF
          -DNUI_FIND_FMT=OFF
          -DFLATPAK_BUILD=ON
          -DJSON_Diagnostics=ON
      # Copy previously downloaded sources into build subdir:
      - mkdir -p build/flatpak/module_nui-sftp/flatpakdeps/nlohmann_json
      - mkdir -p build/flatpak/module_nui-sftp/flatpakdeps/fmt
      - cp -r /app/dependencies/nlohmann_json/* build/flatpak/module_nui-sftp/flatpakdeps/nlohmann_json
      - cp -r /app/dependencies/fmt/* build/flatpak/module_nui-sftp/flatpakdeps/fmt
      - cmake --build build/flatpak
      - ./scripts/deploy.sh
    sources:
      - type: git
        url: https://github.com/5cript/nui-sftp
        tag: v0.1.0