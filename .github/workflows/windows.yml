name: Windows

on:
  push:
    branches:
      - 'main'
      - 'release/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 1.2.3 or v1.2.3)'
        required: true
        default: 'vX.Y.Z'
        type: string

env:
  BUILD_TYPE: Release
  BUILD_DIR: build/clang_release

jobs:
  windows-msys2:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v6

      - uses: msys2/setup-msys2@v2
        with:
          path-type: inherit
          msystem: clang64
          release: true
          install: >-
            make
            libcurl
            unzip
            git
            zip
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-cmake
            mingw-w64-clang-x86_64-boost
            mingw-w64-clang-x86_64-crypto++
            mingw-w64-clang-x86_64-ninja
            mingw-w64-clang-x86_64-python
            mingw-w64-clang-x86_64-pugixml
            mingw-w64-clang-x86_64-fmt
            mingw-w64-clang-x86_64-libssh
            mingw-w64-clang-x86_64-cppwinrt

      - name: Workspace Path Fixup
        run: |
          echo "WSPACE=$(cygpath '${{ github.workspace }}')" >> "$GITHUB_ENV"

      - name: Extract version from PKGBUILD
        if: github.event_name != 'workflow_dispatch'
        run: |
          VERSION=$(./scripts/extract_version.sh)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Dispatch version to environment
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Test node
        run: node --version && whereis node

      - uses: actions/checkout@v6
        with:
          repository: 5cript/nui-sftp
          path: nui-sftp
          fetch-tags: true
          fetch-depth: 0

      - name: Run setup.sh
        run: |
          cd "${{ env.WSPACE }}/nui-sftp" && bash setup.sh

      - name: Configure CMake
        run: |
          cmake \
            -B "${{ env.WSPACE }}/nui-sftp/${{ env.BUILD_DIR }}" \
            -S "${{ env.WSPACE }}/nui-sftp" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DFORCED_PROJECT_VERSION=${{ env.VERSION }} \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_LINKER=lld \
            -DCMAKE_CXX_EXTENSIONS=on \
            -DNUI_ENABLE_TESTS=off \
            -DNUI_BUILD_EXAMPLES=off \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_CXX_STANDARD=23 \
            -DJSON_Diagnostics=ON \
            -DNUI_FETCH_TRAITS=OFF \
            -DNUI_BUILD_XML_TOOL=ON \

      - name: Build
        run: |
          cmake --build \
            "${{ env.WSPACE }}/nui-sftp/${{ env.BUILD_DIR }}" \
            --config "${{ env.BUILD_TYPE }}"

      # Output lands in ${{ env.WSPACE }}/nui-sftp/build/install
      - name: Run deploy script
        env:
          BUILD_DIR: ${{ env.WSPACE }}/nui-sftp/${{ env.BUILD_DIR }}
        run: |
          cd "${{ env.WSPACE }}/nui-sftp" && bash scripts/deploy.sh

      - name: Zip deployed files
        run: |
          cp -r "${{ env.WSPACE }}/nui-sftp/build/install" "${{ env.WSPACE }}/nui-sftp/build/nui-sftp"
          cd "${{ env.WSPACE }}/nui-sftp/build" && \
          zip -r "nui-sftp-windows-x86_64_${{ env.VERSION }}.zip" "nui-sftp"
          mv "nui-sftp-windows-x86_64_${{ env.VERSION }}.zip" "${{ env.WSPACE }}"

      - name: Produce Artifact
        uses: actions/upload-artifact@v6
        with:
          name: nui-sftp-windows-x86_64_${{ env.VERSION }}.zip
          path: ${{ env.WSPACE }}/nui-sftp-windows-x86_64_${{ env.VERSION }}.zip

      - name: Upload Artifact to Release
        # if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.RELEASEUPLOADPAT }}
        run: |
          gh release upload "v${{ env.VERSION }}" "${{ env.WSPACE }}/nui-sftp-windows-x86_64_${{ env.VERSION }}.zip" --repo 5cript/nui-sftp

      - name: Upload artifacts to MEGA S4
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.MEGAS4ACCESS }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.MEGAS4KEY }}
          ENDPOINT: https://s3.eu-central-1.s4.mega.io
          FILENAME: "nui-sftp-windows-x86_64_${{ env.VERSION }}.zip"
          S3_PATH: "s3://nui-sftp-releases/windows/${{ (github.event_name == 'workflow_dispatch' && 'x86_64/user_trigger') || 'x86_64' }}/"
        run: |
          # Check if the file exists on the remote
          if aws s3 ls "${{ env.S3_PATH }}${{ env.FILENAME }}" --endpoint-url ${{ env.ENDPOINT }} > /dev/null 2>&1; then
            echo "Error: File ${{ env.FILENAME }} already exists in S4. Aborting to prevent overwrite."
            exit 1
          fi

          # If it doesnt exist, upload it
          aws s3 cp "${{ env.WSPACE }}/${{ env.FILENAME }}" "${{ env.S3_PATH }}" --endpoint-url ${{ env.ENDPOINT }}